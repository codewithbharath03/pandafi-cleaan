<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:black;
    color:white;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.profileCard{
    width:400px;
    max-width:100%;

    background:#181818;

    border-radius:22px;

    padding:30px;

    display:flex;
    flex-direction:column;

    gap:16px;
}

.profileCard h1{
    text-align:center;
}

#profilePreview{
    width:110px;
    height:110px;

    border-radius:50%;

    object-fit:cover;

    margin:auto;

    border:3px solid #1db954;
}

input,
textarea{
    width:100%;

    background:#242424;

    border:none;
    outline:none;

    color:white;

    padding:14px;

    border-radius:12px;

    font-size:14px;
}

textarea{
    resize:none;
    height:100px;
}

button{
    height:46px;

    border:none;

    border-radius:30px;

    background:#1db954;

    color:black;

    font-weight:bold;

    cursor:pointer;

    font-size:15px;
}

button:hover{
    transform:scale(1.02);
}

#backHome,
#profileLogout{
    width:100%;
    max-width:280px;
    height:46px;

    display:block;

    margin:10px auto;

    border:none;
    border-radius:24px;

    font-size:14px;
    font-weight:bold;

    white-space:nowrap;
    text-align:center;

    background:#1db954;
    color:black;
}

#profileLogout{
    background:#ff3b3b;
    color:white;
}

</style>
</head>
<body>

<div class="profileCard">

    <h1>My Profile</h1>
    <div class="profileStatus">
    <p id="profileEmail"></p>
    <p id="lastLogin"></p>
    <button id="backHome">Back to Music</button>
<button id="profileLogout" class="logoutProfile">Logout</button>
</div>

    <img id="profilePreview" src="image/liked.png">

    <input id="profileImageInput" type="file" accept="image/*">

    <input id="profileName" type="text" placeholder="Your Name">

    <input id="profileDob" type="date">

    <input id="profileAge" type="number" placeholder="Your Age">

    <textarea id="profileHobbies" placeholder="Your hobbies"></textarea>

    <button id="saveProfile">Save Profile</button>
    

</div>

<script>

const profilePreview = document.getElementById("profilePreview");
const profileImageInput = document.getElementById("profileImageInput");

const profileName = document.getElementById("profileName");
const profileDob = document.getElementById("profileDob");
const profileAge = document.getElementById("profileAge");
const profileHobbies = document.getElementById("profileHobbies");

const saveProfile = document.getElementById("saveProfile");

function loadProfile(){

    profilePreview.src =
        localStorage.getItem("profileImage")
        || "image/liked.png";

    profileName.value =
        localStorage.getItem("profileName")
        || "";

    profileDob.value =
        localStorage.getItem("profileDob")
        || "";

    profileAge.value =
        localStorage.getItem("profileAge")
        || "";

    profileHobbies.value =
        localStorage.getItem("profileHobbies")
        || "";
}

loadProfile();

profileImageInput.addEventListener("change", () => {

    const file = profileImageInput.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        profilePreview.src = e.target.result;

        localStorage.setItem(
            "profileImage",
            e.target.result
        );
    };

    reader.readAsDataURL(file);
});

saveProfile.addEventListener("click", () => {

    localStorage.setItem(
        "profileName",
        profileName.value
    );

    localStorage.setItem(
        "profileDob",
        profileDob.value
    );

    localStorage.setItem(
        "profileAge",
        profileAge.value
    );

    localStorage.setItem(
        "profileHobbies",
        profileHobbies.value
    );

    alert("Profile Saved ✅");
});
const backHome = document.getElementById("backHome");
const profileLogout = document.getElementById("profileLogout");

backHome.addEventListener("click", () => {
    window.location.href = "index.html";
});

profileLogout.addEventListener("click", () => {
    localStorage.setItem("pandafiLoggedIn", "false");
    window.location.href = "index.html";
});
</script>

</body>
</html>
